# Builds Flutter web and publishes to GitHub Pages (project site: /flutter_app/).
# Repo: https://github.com/dangkhoaow/flutter_app
#
# After first push: Settings → Pages → Source: GitHub Actions.
# Optional: secret API_URL or variable PUBLIC_API_URL overrides the default below.
# Default API is the Elastic Beanstalk demo host (HTTP). GitHub Pages is HTTPS — if the
# browser blocks mixed content, put HTTPS in front of the API (e.g. CloudFront/ALB) and
# set API_URL to that https://.../api URL.
# Set backend CORS_ORIGIN to https://dangkhoaow.github.io (or * for demos).

name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        env:
          DEFAULT_API_URL: http://vib-pm-flutter-backend.us-east-1.elasticbeanstalk.com/api
        run: |
          set -e
          API_URL="${{ secrets.API_URL }}"
          if [ -z "$API_URL" ]; then
            API_URL="${{ vars.PUBLIC_API_URL }}"
          fi
          if [ -z "$API_URL" ]; then
            API_URL="$DEFAULT_API_URL"
            echo "::notice::Using default API_URL (Elastic Beanstalk). Override with secret API_URL or variable PUBLIC_API_URL."
          fi
          echo "API_URL length check OK (not printing value)."
          flutter build web --release \
            --base-href /flutter_app/ \
            --dart-define=API_URL="$API_URL"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
