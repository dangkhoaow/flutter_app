<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="VIB Internal Project Management">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>VIB PM App</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f7fa; font-family: 'Be Vietnam Pro', sans-serif; }
    #loading {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #0f1a3d 0%, #1a2b5f 100%);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 20px; z-index: 9999;
    }
    #loading .logo {
      width: 56px; height: 56px; border-radius: 14px;
      background: linear-gradient(135deg, #f7931e, #ffc629);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 900; color: #0f1a3d;
    }
    #loading p { color: rgba(255,255,255,0.6); font-size: 13px; font-family: inherit; }
    #loading .spinner {
      width: 28px; height: 28px; border: 3px solid rgba(247,147,30,0.3);
      border-top-color: #f7931e; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">VB</div>
    <p>VIB Project Management</p>
    <div class="spinner"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('loading').style.display = 'none';
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
